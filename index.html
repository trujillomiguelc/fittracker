<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker Beta</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background-color: #0C0C0F; color: #F0EDE8; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="FitTracker.jsx"></script>

    <script type="text/babel">
      // This function waits for the file above to load, then starts the app
      window.onload = () => {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        // We are using 'FitTracker' because that's the name in your code
        root.render(React.createElement(FitTracker)); 
      };
    </script>
  </body>
</html>
